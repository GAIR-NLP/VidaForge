defaults:
  - /serve@serve: vllm
  - _self_

name: step1_camera

label_version: camera_v1
resume: false

client:
  batch_size: 256
  ray_num_cpus: 1.0

inference:
  # local = file:// paths on a shared filesystem; base64 = data URLs in request body.
  media_input: local
  request_concurrency: 1
  trust_env: false
  temperature: 0.0
  top_p: 1.0
  presence_penalty: 0.0
  max_tokens: 8192
  extra_body: {}
  store_prompt: false
